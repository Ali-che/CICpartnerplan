<title>Partner Course Planner · 校校合作课程规划系统</title>
<style>
  :root {
    --ink: #1B2433;
    --ink-soft: #4A5568;
    --muted: #6B7686;
    --paper: #F3F4F1;
    --surface: #FFFFFF;
    --border: #DCE0D8;
    --border-strong: #C3C9BD;
    --accent: #2C6E5B;
    --accent-deep: #1F4F41;
    --accent-soft: #E5EEE9;
    --amber: #A8632A;
    --amber-soft: #F4E9DD;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Songti SC", Georgia, serif;
    --sans: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, "Segoe UI", system-ui, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Roboto Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  .page {
    background: var(--paper); color: var(--ink); font-family: var(--sans);
    line-height: 1.6; font-size: 15px; -webkit-font-smoothing: antialiased;
    padding: clamp(1.2rem, 3vw, 2.5rem) 1rem 6rem;
  }
  .wrap { max-width: 860px; margin: 0 auto; }

  .top { border-top: 3px solid var(--ink); padding-top: 1.1rem; margin-bottom: 1.6rem; }
  .eyebrow { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.7rem; }
  h1 { font-family: var(--serif); font-weight: 600; font-size: clamp(1.5rem, 4vw, 2.1rem); margin: 0 0 0.4rem; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 0.92rem; margin: 0; }
  .demo-tag { display: inline-block; font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.08em; background: var(--amber-soft); color: var(--amber); padding: 0.2em 0.6em; border-radius: 20px; margin-left: 0.5rem; vertical-align: middle; }
  .flowline { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); margin-top: 0.7rem; }
  .flowline b { color: var(--accent-deep); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem 1.3rem; margin-bottom: 1.2rem; }
  .card-label { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
  .card-label .step { width: 1.4rem; height: 1.4rem; border-radius: 50%; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; letter-spacing: 0; }
  .card-label .db { margin-left: auto; font-size: 0.62rem; letter-spacing: 0.06em; background: var(--accent-soft); color: var(--accent-deep); padding: 0.15em 0.6em; border-radius: 20px; text-transform: none; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.9rem 1rem; }
  .fld { display: flex; flex-direction: column; gap: 0.3rem; }
  .fld label { font-size: 0.76rem; color: var(--ink-soft); font-weight: 600; }
  .fld input, .fld select { font-family: var(--sans); font-size: 0.9rem; color: var(--ink); background: var(--paper); border: 1px solid var(--border-strong); border-radius: 6px; padding: 0.5rem 0.7rem; min-width: 0; }
  .fld input:focus, .fld select:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .fld.year select { min-width: 130px; }
  @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }

  /* major selector */
  .major-select-row { display: flex; align-items: flex-end; gap: 1rem; flex-wrap: wrap; }
  .major-select-row .fld { flex: 1; min-width: 220px; }
  .picked { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-top: 0.9rem; }
  .picked:empty { display: none; }
  .chip { font-family: var(--mono); font-size: 0.72rem; background: var(--accent-soft); color: var(--accent-deep); border: 1px solid var(--accent); padding: 0.25em 0.7em; border-radius: 20px; cursor: pointer; }
  .chip:hover { background: var(--accent); color: #fff; }
  .chip b { font-weight: 700; }
  .picked-label { font-size: 0.72rem; color: var(--muted); width: 100%; margin-bottom: -0.2rem; }

  /* course library */
  .lib-major-h { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.4rem; background: var(--accent-soft); color: var(--accent-deep); padding: 0.5rem 0.8rem; border-radius: 6px; margin-bottom: 0.6rem; }
  .lib-major-h .nm { font-weight: 700; font-size: 0.95rem; }
  .lib-major-h .nm em { font-style: normal; font-weight: 500; color: var(--accent); font-size: 0.82em; margin-left: 0.4rem; }
  .lib-major-h .yr { font-family: var(--mono); font-size: 0.66rem; background: var(--surface); border: 1px solid var(--border-strong); padding: 0.15em 0.6em; border-radius: 20px; }
  .cat-h { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; margin: 0.9rem 0 0.4rem; }

  .course { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.65rem; border-radius: 7px; border: 1px solid transparent; cursor: pointer; transition: background 0.12s, border-color 0.12s; }
  .course:hover { background: var(--paper); }
  .course.on { background: var(--accent-soft); border-color: var(--accent); }
  .course input { width: 17px; height: 17px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
  .course .info { flex: 1; min-width: 0; }
  .course .zh { font-weight: 600; font-size: 0.9rem; }
  .course .en { color: var(--muted); font-size: 0.78rem; font-style: italic; }
  .course .cr { font-family: var(--mono); font-size: 0.8rem; color: var(--accent-deep); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .course .cr b { font-size: 0.95rem; }

  /* sticky bar */
  .sticky { position: sticky; bottom: 0; z-index: 5; margin: 0 -0.3rem; background: var(--ink); color: #fff; border-radius: 10px; padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; flex-wrap: wrap; box-shadow: 0 6px 24px rgba(27,36,51,0.22); }
  .sticky .tally { font-family: var(--mono); font-size: 0.85rem; display: flex; gap: 1.3rem; flex-wrap: wrap; }
  .sticky .tally b { color: #8FD3BE; font-size: 1.05rem; }
  .btn { font-family: var(--sans); font-size: 0.86rem; font-weight: 700; color: #fff; background: var(--accent); border: none; border-radius: 7px; padding: 0.55rem 1.1rem; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: var(--accent-deep); }
  .btn:disabled { background: #4A5568; cursor: not-allowed; opacity: 0.6; }
  .btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .btn.ghost { background: transparent; border: 1px solid var(--border-strong); color: var(--accent-deep); }
  .btn.ghost:hover { background: var(--accent-soft); }

  /* output */
  #output { margin-top: 1.6rem; scroll-margin-top: 1rem; }
  .out-card { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 10px; padding: 1.5rem 1.4rem; box-shadow: 0 4px 18px rgba(27,36,51,0.07); }
  .out-head { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem; padding-bottom: 1rem; border-bottom: 2px solid var(--ink); margin-bottom: 1.2rem; }
  .out-head .t { font-family: var(--serif); font-size: 1.25rem; font-weight: 600; }
  .out-head .m { font-family: var(--mono); font-size: 0.74rem; color: var(--muted); text-align: right; }
  .out-head .m span { display: block; }
  .o-major { margin-bottom: 1.5rem; }
  .o-major-h { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.4rem; background: var(--accent-soft); color: var(--accent-deep); font-weight: 700; padding: 0.45rem 0.75rem; border-radius: 5px; margin-bottom: 0.5rem; }
  .o-major-h em { font-style: normal; font-weight: 500; color: var(--accent); font-size: 0.85em; margin-left: 0.35rem; }
  .o-major-h .yr { font-family: var(--mono); font-size: 0.66rem; background: var(--surface); border: 1px solid var(--border-strong); padding: 0.15em 0.6em; border-radius: 20px; }
  .o-cat { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; margin: 0.7rem 0 0.3rem; }
  table.out { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
  table.out th, table.out td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); text-align: left; }
  table.out th { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  table.out td.en { color: var(--muted); font-style: italic; font-size: 0.8rem; }
  table.out td.num, table.out th.num { text-align: right; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  tr.subtotal td { font-weight: 700; border-top: 1px solid var(--border-strong); border-bottom: none; color: var(--ink-soft); font-size: 0.8rem; }
  .o-major-total { text-align: right; font-family: var(--mono); font-size: 0.82rem; font-weight: 700; color: var(--accent-deep); margin-top: 0.6rem; padding-top: 0.5rem; border-top: 1px dashed var(--border-strong); }
  .o-major-total b { color: var(--amber); }
  .grand { display: flex; justify-content: flex-end; gap: 2rem; margin-top: 1.2rem; padding-top: 1rem; border-top: 2px solid var(--ink); font-family: var(--mono); font-size: 0.92rem; flex-wrap: wrap; }
  .grand b { color: var(--accent-deep); font-size: 1.15rem; }
  .out-actions { display: flex; gap: 0.6rem; margin-top: 1.2rem; justify-content: flex-end; flex-wrap: wrap; }

  .empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 1.5rem; }
  .hint { font-size: 0.8rem; color: var(--muted); margin-top: 0.6rem; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

<div class="page">
<div class="wrap">

  <div class="top">
    <div class="eyebrow">Partner Course Planner · 校校合作</div>
    <h1>校校合作课程规划系统<span class="demo-tag">DEMO · 假数据</span></h1>
    <p class="sub">学校端老师的操作流程。学年与专业清单都从数据库读出——数据库有什么，下拉就出现什么。</p>
    <div class="flowline">流程 · 填资料 → <b>选学年</b> → <b>选专业</b> → 勾课 → 生成架构表</div>
  </div>

  <!-- Step 1: form -->
  <div class="card">
    <div class="card-label"><span class="step">1</span>填写项目资料<span class="db">学年 ← 数据库</span></div>
    <div class="form-grid">
      <div class="fld"><label for="school">合作项目学校名称</label><input id="school" type="text" value="示例大学" /></div>
      <div class="fld"><label for="project">合作项目名称</label><input id="project" type="text" value="中外合作办学项目" /></div>
      <div class="fld year"><label for="year">适用学年课纲</label><select id="year"></select></div>
    </div>
    <p class="hint">下拉只会出现数据库里真实存在的学年（select distinct academic_year）。切换学年会重设专业与勾选。</p>
  </div>

  <!-- Step 2: major -->
  <div class="card">
    <div class="card-label"><span class="step">2</span>选择专业<span class="db">专业 ← 数据库（按学年）</span></div>
    <div class="major-select-row">
      <div class="fld"><label for="major">专业</label><select id="major"></select></div>
    </div>
    <div class="picked" id="picked"></div>
    <p class="hint">专业清单按所选学年查出。可切换不同专业分别勾课，已勾的会累积到同一份架构表。</p>
  </div>

  <!-- Step 3: library -->
  <div class="card">
    <div class="card-label"><span class="step">3</span>勾选课程</div>
    <div id="library"></div>
  </div>

  <!-- sticky tally + generate -->
  <div class="sticky">
    <div class="tally">
      <span>已选 <b id="tCount">0</b> 门课</span>
      <span>共 <b id="tCredit">0</b> 学分</span>
      <span><b id="tMajor">0</b> 个专业</span>
    </div>
    <button class="btn" id="genBtn" disabled>生成课程架构表 →</button>
  </div>

  <div id="output"></div>

</div>
</div>

<script>
(function () {
  // ---- mock 课程库（模拟 Supabase courses 表）----
  const COURSES = [
    // 数字媒体设计 · 114
    { id:'dm114-1', year:'114', mzh:'数字媒体设计', men:'Digital Media Design', cat:'设计基础', zh:'设计概论', en:'Introduction to Design', cr:3 },
    { id:'dm114-2', year:'114', mzh:'数字媒体设计', men:'Digital Media Design', cat:'设计基础', zh:'色彩构成', en:'Color Composition', cr:2 },
    { id:'dm114-3', year:'114', mzh:'数字媒体设计', men:'Digital Media Design', cat:'设计基础', zh:'素描', en:'Drawing', cr:2 },
    { id:'dm114-4', year:'114', mzh:'数字媒体设计', men:'Digital Media Design', cat:'数字技术', zh:'交互设计', en:'Interaction Design', cr:3 },
    { id:'dm114-5', year:'114', mzh:'数字媒体设计', men:'Digital Media Design', cat:'数字技术', zh:'三维建模', en:'3D Modeling', cr:3 },
    { id:'dm114-6', year:'114', mzh:'数字媒体设计', men:'Digital Media Design', cat:'数字技术', zh:'动态图形', en:'Motion Graphics', cr:3 },
    { id:'dm114-7', year:'114', mzh:'数字媒体设计', men:'Digital Media Design', cat:'毕业专题', zh:'毕业制作', en:'Graduation Project', cr:4 },
    // 商务英语 · 114
    { id:'be114-1', year:'114', mzh:'商务英语', men:'Business English', cat:'语言核心', zh:'综合英语', en:'Integrated English', cr:4 },
    { id:'be114-2', year:'114', mzh:'商务英语', men:'Business English', cat:'语言核心', zh:'英语听说', en:'English Listening & Speaking', cr:3 },
    { id:'be114-3', year:'114', mzh:'商务英语', men:'Business English', cat:'商务应用', zh:'商务写作', en:'Business Writing', cr:3 },
    { id:'be114-4', year:'114', mzh:'商务英语', men:'Business English', cat:'商务应用', zh:'国际贸易实务', en:'International Trade Practice', cr:3 },
    // 数字媒体设计 · 113（旧课纲）
    { id:'dm113-1', year:'113', mzh:'数字媒体设计', men:'Digital Media Design', cat:'设计基础', zh:'设计概论', en:'Introduction to Design', cr:3 },
    { id:'dm113-2', year:'113', mzh:'数字媒体设计', men:'Digital Media Design', cat:'设计基础', zh:'平面构成', en:'Plane Composition', cr:2 },
    { id:'dm113-3', year:'113', mzh:'数字媒体设计', men:'Digital Media Design', cat:'数字技术', zh:'网页设计', en:'Web Design', cr:3 },
    { id:'dm113-4', year:'113', mzh:'数字媒体设计', men:'Digital Media Design', cat:'数字技术', zh:'影像处理', en:'Image Editing', cr:3 },
  ];

  const selected = new Set();
  let curYear = null, curMajor = null;
  const $ = (s) => document.querySelector(s);
  const yearEl = $('#year'), majorEl = $('#major'), libEl = $('#library');

  const esc = (s) => String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

  // 模拟：select distinct academic_year from courses order by academic_year desc
  function distinctYears() { return [...new Set(COURSES.map(c => c.year))].sort().reverse(); }
  // 模拟：select distinct major from courses where academic_year = :year
  function majorsForYear(y) {
    const seen = new Map();
    COURSES.filter(c => c.year === y).forEach(c => { if (!seen.has(c.mzh)) seen.set(c.mzh, c.men); });
    return [...seen.entries()].map(([mzh, men]) => ({ mzh, men }));
  }
  function coursesFor(y, m) { return COURSES.filter(c => c.year === y && c.mzh === m); }
  function menOf(mzh) { const c = COURSES.find(x => x.mzh === mzh); return c ? c.men : ''; }

  function populateYears() {
    const years = distinctYears();
    yearEl.innerHTML = years.map(y => '<option value="' + y + '">' + y + ' 学年度</option>').join('');
    curYear = years[0];
  }

  function populateMajors() {
    const majors = majorsForYear(curYear);
    if (!majors.length) {
      majorEl.innerHTML = '<option value="">（此学年度无专业）</option>';
      curMajor = null;
    } else {
      majorEl.innerHTML = majors.map(m => '<option value="' + esc(m.mzh) + '">' + esc(m.mzh) + '（' + esc(m.men) + '）</option>').join('');
      curMajor = majors[0].mzh;
    }
  }

  function renderLibrary() {
    libEl.innerHTML = '';
    if (!curMajor) { libEl.innerHTML = '<div class="empty">请先选择专业。</div>'; return; }
    const list = coursesFor(curYear, curMajor);
    if (!list.length) { libEl.innerHTML = '<div class="empty">此专业在该学年度尚无课程。</div>'; return; }

    const head = document.createElement('div');
    head.className = 'lib-major-h';
    head.innerHTML = '<span class="nm">' + esc(curMajor) + '<em>' + esc(menOf(curMajor)) + '</em></span><span class="yr">' + curYear + ' 学年度课纲</span>';
    libEl.appendChild(head);

    const cats = {}; const order = [];
    for (const c of list) { if (!(c.cat in cats)) { cats[c.cat] = []; order.push(c.cat); } cats[c.cat].push(c); }
    for (const cat of order) {
      const ch = document.createElement('div'); ch.className = 'cat-h'; ch.textContent = cat; libEl.appendChild(ch);
      for (const c of cats[cat]) {
        const row = document.createElement('label');
        row.className = 'course' + (selected.has(c.id) ? ' on' : '');
        row.innerHTML =
          '<input type="checkbox" ' + (selected.has(c.id) ? 'checked' : '') + ' />' +
          '<span class="info"><span class="zh">' + esc(c.zh) + '</span> <span class="en">' + esc(c.en) + '</span></span>' +
          '<span class="cr"><b>' + c.cr + '</b> 学分</span>';
        const cb = row.querySelector('input');
        cb.addEventListener('change', () => {
          if (cb.checked) { selected.add(c.id); row.classList.add('on'); }
          else { selected.delete(c.id); row.classList.remove('on'); }
          updateTally(); renderPicked();
        });
        libEl.appendChild(row);
      }
    }
  }

  function selectedList() { return COURSES.filter(c => selected.has(c.id)); }

  // 已勾选的专业（本学年）以 chip 呈现，点击可跳回该专业
  function renderPicked() {
    const box = $('#picked');
    const sel = selectedList().filter(c => c.year === curYear);
    const byMajor = {};
    for (const c of sel) { (byMajor[c.mzh] = byMajor[c.mzh] || []).push(c); }
    const keys = Object.keys(byMajor);
    if (!keys.length) { box.innerHTML = ''; return; }
    let html = '<span class="picked-label">已勾选专业（点击可切回）</span>';
    for (const mzh of keys) {
      const arr = byMajor[mzh];
      const cr = arr.reduce((s, c) => s + c.cr, 0);
      html += '<span class="chip" data-m="' + esc(mzh) + '">' + esc(mzh) + ' · <b>' + arr.length + '</b>门 ' + cr + '学分</span>';
    }
    box.innerHTML = html;
    box.querySelectorAll('.chip').forEach(ch => ch.addEventListener('click', () => {
      curMajor = ch.getAttribute('data-m');
      majorEl.value = curMajor; renderLibrary();
    }));
  }

  function updateTally() {
    const sel = selectedList();
    const majors = new Set(sel.map(c => c.mzh));
    $('#tCount').textContent = sel.length;
    $('#tCredit').textContent = sel.reduce((s, c) => s + c.cr, 0);
    $('#tMajor').textContent = majors.size;
    $('#genBtn').disabled = sel.length === 0;
  }

  function generate() {
    const sel = selectedList();
    if (!sel.length) return;
    const school = esc($('#school').value || '（未填学校）');
    const project = esc($('#project').value || '（未填项目）');
    const year = curYear;

    const majors = []; const mIndex = {};
    for (const c of sel) {
      if (!(c.mzh in mIndex)) { mIndex[c.mzh] = { mzh:c.mzh, men:c.men, cats:{}, order:[] }; majors.push(mIndex[c.mzh]); }
      const m = mIndex[c.mzh];
      if (!(c.cat in m.cats)) { m.cats[c.cat] = []; m.order.push(c.cat); }
      m.cats[c.cat].push(c);
    }

    let grandCount = 0, grandCredit = 0;
    let html = '<div class="out-card"><div class="out-head"><div class="t">课程架构表</div><div class="m">' +
      '<span>合作学校 · ' + school + '</span><span>合作项目 · ' + project + '</span><span>适用课纲 · ' + year + ' 学年度</span></div></div>';

    for (const m of majors) {
      let mCount = 0, mCredit = 0;
      html += '<div class="o-major"><div class="o-major-h"><span>' + esc(m.mzh) + '<em>' + esc(m.men) + '</em></span><span class="yr">' + year + ' 学年度课纲</span></div>';
      for (const cat of m.order) {
        const rows = m.cats[cat]; let cCredit = 0;
        html += '<div class="o-cat">' + esc(cat) + '</div><table class="out"><thead><tr><th>课程名称（中）</th><th>课程名称（英）</th><th class="num">学分</th></tr></thead><tbody>';
        for (const c of rows) { html += '<tr><td>' + esc(c.zh) + '</td><td class="en">' + esc(c.en) + '</td><td class="num">' + c.cr + '</td></tr>'; cCredit += c.cr; }
        html += '<tr class="subtotal"><td>小计</td><td class="num">' + rows.length + ' 门课</td><td class="num">' + cCredit + '</td></tr></tbody></table>';
        mCount += rows.length; mCredit += cCredit;
      }
      html += '<div class="o-major-total">' + esc(m.mzh) + ' · 专业合计　总课数 <b>' + mCount + '</b> 门　总学分 <b>' + mCredit + '</b></div></div>';
      grandCount += mCount; grandCredit += mCredit;
    }

    html += '<div class="grand"><span>全项目合计 &nbsp;<b>' + grandCount + '</b> 门课</span><span>总学分 &nbsp;<b>' + grandCredit + '</b></span></div></div>';
    html += '<div class="out-actions"><button class="btn ghost" id="printBtn">打印 / 导出 PDF</button></div>';

    const out = $('#output');
    out.innerHTML = html;
    const pb = $('#printBtn'); if (pb) pb.addEventListener('click', () => window.print());
    out.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  yearEl.addEventListener('change', () => {
    curYear = yearEl.value;
    selected.clear();                 // 项目只属于单一学年，切换学年清空勾选
    populateMajors(); renderLibrary(); renderPicked(); updateTally();
    $('#output').innerHTML = '';
  });
  majorEl.addEventListener('change', () => { curMajor = majorEl.value; renderLibrary(); });
  $('#genBtn').addEventListener('click', generate);

  // init
  populateYears(); populateMajors(); renderLibrary(); renderPicked(); updateTally();
})();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>管理后台 · Partner Course Planner</title>
<style>
  :root{
    --ink:#1B2433;--ink-soft:#4A5568;--muted:#6B7686;--paper:#F3F4F1;--surface:#FFFFFF;
    --border:#DCE0D8;--border-strong:#C3C9BD;--accent:#2C6E5B;--accent-deep:#1F4F41;--accent-soft:#E5EEE9;
    --amber:#A8632A;--amber-soft:#F4E9DD;--danger:#9E3B36;--danger-soft:#F3E2E0;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Songti SC",Georgia,serif;
    --sans:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,"Segoe UI",system-ui,sans-serif;
    --mono:"SF Mono","JetBrains Mono","Roboto Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased;}
  .page{padding:clamp(1.2rem,3vw,2.5rem) 1rem 5rem;}
  .wrap{max-width:940px;margin:0 auto;}
  .top{border-top:3px solid var(--ink);padding-top:1.1rem;margin-bottom:1.4rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:.6rem;}
  .eyebrow{font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(1.4rem,4vw,2rem);margin:0;letter-spacing:-.01em;}
  .top a{font-size:.82rem;color:var(--accent-deep);text-decoration:none;font-weight:600;}
  .top a:hover{text-decoration:underline;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.2rem;margin-bottom:1.1rem;}
  .card-label{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.85rem;}

  .fld{display:flex;flex-direction:column;gap:.3rem;min-width:0;}
  .fld label{font-size:.74rem;color:var(--ink-soft);font-weight:600;}
  input[type=text],input[type=password]{font-family:var(--sans);font-size:.88rem;color:var(--ink);background:var(--paper);border:1px solid var(--border-strong);border-radius:6px;padding:.5rem .65rem;}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  .pw-wrap{position:relative;width:100%;}
  .pw-wrap input{width:100%;padding-right:2.3rem;}
  .pw-eye{position:absolute;right:.3rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.05rem;line-height:1;padding:.15rem .3rem;opacity:.55;}
  .pw-eye:hover{opacity:1;}
  .pw-eye:focus-visible{outline:2px solid var(--accent);border-radius:4px;}
  .mono{font-family:var(--mono);font-size:.82rem;}

  .btn{font-family:var(--sans);font-size:.85rem;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:7px;padding:.55rem 1.05rem;cursor:pointer;white-space:nowrap;}
  .btn:hover{background:var(--accent-deep);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .row-end{display:flex;gap:.7rem;align-items:flex-end;flex-wrap:wrap;}

  .status{font-family:var(--mono);font-size:.76rem;margin-top:.7rem;padding:.5rem .7rem;border-radius:6px;display:none;}
  .status.show{display:block;}
  .status.ok{background:var(--accent-soft);color:var(--accent-deep);}
  .status.err{background:var(--danger-soft);color:var(--danger);}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1.1rem;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem .9rem;}
  .stat .n{font-family:var(--mono);font-size:1.5rem;font-weight:700;line-height:1;}
  .stat .l{font-size:.72rem;color:var(--muted);margin-top:.3rem;}

  .tabs{display:flex;gap:.4rem;margin-bottom:1rem;}
  .tab{font-size:.85rem;font-weight:600;padding:.45rem .9rem;border-radius:7px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-soft);cursor:pointer;}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink);}

  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:.85rem;min-width:520px;}
  th,td{text-align:left;padding:.55rem .7rem;border-bottom:1px solid var(--border);vertical-align:middle;}
  th{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:#FAFBF9;}
  td.mono{font-family:var(--mono);font-size:.78rem;}
  td.num{text-align:center;font-family:var(--mono);}
  .pill{font-size:.68rem;font-weight:600;padding:.15em .6em;border-radius:20px;white-space:nowrap;}
  .pill.on{background:var(--accent-soft);color:var(--accent-deep);}
  .pill.off{background:var(--danger-soft);color:var(--danger);}
  .mini{font-family:var(--sans);font-size:.74rem;font-weight:600;padding:.28rem .55rem;border-radius:5px;border:1px solid var(--border-strong);background:var(--surface);color:var(--accent-deep);cursor:pointer;margin-right:.35rem;}
  .mini:hover{background:var(--accent-soft);}
  .mini.del{color:var(--danger);}
  .mini.del:hover{background:var(--danger-soft);}

  .hint{font-size:.78rem;color:var(--muted);margin-top:.55rem;}
  .empty{color:var(--muted);text-align:center;padding:1.2rem;}
  details.adv summary{font-size:.76rem;color:var(--muted);cursor:pointer;margin-top:.7rem;}
  .toast{position:fixed;left:50%;bottom:2rem;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:.85rem;padding:.6rem 1.1rem;border-radius:8px;box-shadow:0 6px 22px rgba(27,36,51,.28);z-index:20;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  .modal-bg{position:fixed;inset:0;background:rgba(27,36,51,.5);display:none;align-items:center;justify-content:center;z-index:30;padding:1rem;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--surface);border-radius:12px;padding:1.3rem;max-width:540px;width:100%;max-height:85vh;overflow:auto;box-shadow:0 12px 40px rgba(27,36,51,.3);}
  .modal-h{font-family:var(--serif);font-size:1.15rem;font-weight:600;margin-bottom:.25rem;}
  .modal-hint{font-size:.78rem;color:var(--muted);margin-bottom:1rem;}
  .block-list{display:flex;flex-direction:column;gap:.1rem;margin-bottom:1rem;}
  .block-item{display:flex;align-items:center;gap:.6rem;padding:.4rem .5rem;border-radius:6px;cursor:pointer;font-size:.86rem;}
  .block-item:hover{background:var(--paper);}
  .block-item input{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;}
  .modal-actions{display:flex;gap:.5rem;align-items:center;}
  /* 导出用课程架构表 */
  #printArea{display:none;}
  .out-card{padding:.5rem;}
  .out-head{display:flex;justify-content:space-between;flex-wrap:wrap;gap:.6rem;padding-bottom:1rem;border-bottom:2px solid var(--ink);margin-bottom:1.1rem;}
  .out-head .t{font-family:var(--serif);font-size:1.2rem;font-weight:600;}
  .out-head .m{font-family:var(--mono);font-size:.74rem;color:var(--muted);text-align:right;}
  .out-head .m span{display:block;}
  .o-major{margin-bottom:1.4rem;}
  .o-major-h{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.4rem;background:var(--accent-soft);color:var(--accent-deep);font-weight:700;padding:.45rem .75rem;border-radius:5px;margin-bottom:.5rem;}
  .o-major-h .yr{font-family:var(--mono);font-size:.66rem;background:var(--surface);border:1px solid var(--border-strong);padding:.15em .6em;border-radius:20px;}
  .o-block{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin:.7rem 0 .3rem;}
  table.out{width:100%;border-collapse:collapse;font-size:.85rem;}
  table.out th,table.out td{padding:.38rem .5rem;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;}
  table.out th{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
  table.out td.code{font-family:var(--mono);font-size:.76rem;color:var(--muted);white-space:nowrap;}
  table.out td.en{color:var(--muted);font-style:italic;font-size:.78rem;}
  table.out td.map{font-family:var(--mono);font-size:.72rem;color:var(--amber);}
  table.out td.num,table.out th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;}
  tr.subtotal td{font-weight:700;border-top:1px solid var(--border-strong);border-bottom:none;color:var(--ink-soft);font-size:.8rem;}
  .o-major-total{text-align:right;font-family:var(--mono);font-size:.82rem;font-weight:700;color:var(--accent-deep);margin-top:.6rem;padding-top:.5rem;border-top:1px dashed var(--border-strong);}
  .o-major-total b{color:var(--amber);}
  .grand{display:flex;justify-content:flex-end;gap:2rem;margin-top:1.1rem;padding-top:1rem;border-top:2px solid var(--ink);font-family:var(--mono);font-size:.9rem;flex-wrap:wrap;}
  .grand b{color:var(--accent-deep);font-size:1.15rem;}
  @media print{
    .page,.modal-bg,.toast{display:none!important;}
    #printArea{display:block!important;}
    body{background:#fff;}
    .o-major,table.out{page-break-inside:avoid;}
  }
  @media (max-width:560px){.stats{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="page">
<div class="wrap">

  <div class="top">
    <div>
      <div class="eyebrow">Admin · 管理后台</div>
      <h1>合作校帐号与项目管理</h1>
    </div>
    <a href="./index.html" id="logoutA">登出</a>
  </div>

  <!-- 登入 -->
  <div class="card" id="loginCard">
    <div class="card-label">管理员登入</div>
    <div class="row-end">
      <div class="fld" style="flex:1;min-width:180px;"><label for="apin">管理员 PIN</label><div class="pw-wrap"><input id="apin" class="mono" type="password" placeholder="输入管理员 PIN" autocomplete="off" /><button type="button" class="pw-eye" id="apinEye" aria-label="显示或隐藏 PIN">👁</button></div></div>
      <button class="btn" id="loginBtn">登入</button>
    </div>
    <details class="adv">
      <summary>高级：Supabase 连接（一般不用改）</summary>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-top:.6rem;">
        <div class="fld"><label>Supabase URL</label><input id="supaUrl" class="mono" type="text" value="https://ahygebtmavcmzqdwwhbs.supabase.co" /></div>
        <div class="fld"><label>Publishable Key</label><input id="supaKey" class="mono" type="text" value="sb_publishable_hWK78P_LTzHgKcuFMI2FVg_44Yw_tsZ" /></div>
      </div>
    </details>
    <div class="status" id="loginStatus"></div>
  </div>

  <!-- 后台主体 -->
  <div id="admin" style="display:none;">
    <div class="stats">
      <div class="stat"><div class="n" id="sSchools">0</div><div class="l">合作学校</div></div>
      <div class="stat"><div class="n" id="sActive">0</div><div class="l">启用中</div></div>
      <div class="stat"><div class="n" id="sProjects">0</div><div class="l">项目总数</div></div>
    </div>

    <div class="tabs">
      <button class="tab on" data-tab="accounts">帐号管理</button>
      <button class="tab" data-tab="projects">项目总览</button>
    </div>

    <!-- 帐号管理 -->
    <div id="tab-accounts">
      <div class="card">
        <div class="card-label">新增合作校帐号</div>
        <div class="row-end">
          <div class="fld" style="flex:1;min-width:140px;"><label>学校名称</label><input id="newSchool" type="text" placeholder="例：示例大学" /></div>
          <div class="fld" style="flex:1;min-width:140px;"><label>登入 PIN</label><input id="newPin" class="mono" type="text" placeholder="给这所学校的 PIN" /></div>
          <button class="btn" id="addBtn">新增</button>
        </div>
        <p class="hint">把「学校名称 + PIN」交给该校老师，他们用这个 PIN 在学校端登入，只看得到自己的项目。</p>
      </div>
      <div class="card">
        <div class="card-label">合作校帐号</div>
        <div class="table-scroll"><table id="accTable"><thead>
          <tr><th>学校</th><th>PIN</th><th style="text-align:center">项目</th><th>状态</th><th>开放范围</th><th>操作</th></tr>
        </thead><tbody></tbody></table></div>
      </div>
    </div>

    <!-- 项目总览 -->
    <div id="tab-projects" style="display:none;">
      <div class="card">
        <div class="card-label">所有合作校的项目</div>
        <div class="table-scroll"><table id="projTable"><thead>
          <tr><th>项目</th><th>学校</th><th>专业·版本</th><th style="text-align:center">课数</th><th>更新时间</th><th>操作</th></tr>
        </thead><tbody></tbody></table></div>
      </div>
    </div>
  </div>

</div>
</div>

<div class="modal-bg" id="blockModal">
  <div class="modal">
    <div class="modal-h">开放板块 · <span id="bmSchool"></span></div>
    <div class="modal-hint">选专业 → 勾该专业要开放的板块。学校登入后<b>只会出现你勾过的专业与板块</b>。全都不勾 = 开放全部。</div>
    <div class="fld" style="margin-bottom:.8rem;"><label>专业</label><select id="bmDept"></select></div>
    <div class="block-list" id="bmList"></div>
    <div class="modal-actions">
      <button class="mini" id="bmAll">本专业全选</button>
      <button class="mini" id="bmNone">本专业全不选</button>
      <span style="flex:1"></span>
      <button class="btn" id="bmSave">保存</button>
      <button class="mini" id="bmCancel">取消</button>
    </div>
  </div>
</div>

<div id="printArea"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var $=function(s){return document.querySelector(s);};
  var esc=function(s){return String(s==null?'':s).replace(/[&<>]/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]);});};
  var adminPin=null, toastTimer=null;
  var ALL_BLOCKS=[], bmPin=null;

  function toast(m){var e=$('#toast');e.textContent=m;e.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(function(){e.classList.remove('show');},2200);}
  function setLoginStatus(k,m){var e=$('#loginStatus');e.className='status show '+k;e.innerHTML=m;}

  function rpc(fn,body){
    var url=$('#supaUrl').value.trim().replace(/\/+$/,'');
    var key=$('#supaKey').value.trim();
    return fetch(url+'/rest/v1/rpc/'+fn,{
      method:'POST',
      headers:{'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    }).then(function(res){
      if(!res.ok){return res.text().then(function(t){throw new Error('HTTP '+res.status+' '+t.slice(0,140));});}
      return res.json();
    });
  }

  function login(){
    var pin=$('#apin').value.trim();
    if(!pin){setLoginStatus('err','请输入管理员 PIN。');return;}
    $('#loginBtn').disabled=true;setLoginStatus('ok','验证中…');
    rpc('admin_authenticate',{p_admin:pin}).then(function(d){
      if(!d||d.error){setLoginStatus('err','登入失败：'+((d&&d.error)||'未知')+'（PIN 可能错误，或未跑 partner_admin.sql）');$('#loginBtn').disabled=false;return;}
      adminPin=pin;
      $('#loginCard').style.display='none';
      $('#admin').style.display='';
      loadBlocks();
      renderAccounts(d.partners||[]);
      loadProjects();
    }).catch(function(err){setLoginStatus('err','登入失败：'+esc(err.message));$('#loginBtn').disabled=false;});
  }

  function refreshAccounts(){
    rpc('admin_authenticate',{p_admin:adminPin}).then(function(d){renderAccounts((d&&d.partners)||[]);}).catch(function(){});
  }
  var PARTNERS={};
  function scopeLabel(p){var s=p.scope_count||0;if(!s)return '全部';return (p.dept_count||0)+'专业·'+s+'板块';}
  function renderAccounts(list){
    PARTNERS={};
    $('#sSchools').textContent=list.length;
    $('#sActive').textContent=list.filter(function(p){return p.active;}).length;
    var tb=$('#accTable').querySelector('tbody');
    if(!list.length){tb.innerHTML='<tr><td colspan="6" class="empty">还没有合作校帐号。用上方「新增」。</td></tr>';return;}
    tb.innerHTML='';
    list.forEach(function(p){
      PARTNERS[p.pin]=p;
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+esc(p.school_name||'（未命名）')+'</td>'+
        '<td class="mono">'+esc(p.pin)+'</td>'+
        '<td class="num">'+(p.project_count||0)+'</td>'+
        '<td>'+(p.active?'<span class="pill on">启用</span>':'<span class="pill off">停用</span>')+'</td>'+
        '<td><button class="mini" data-blk="'+esc(p.pin)+'">'+scopeLabel(p)+' ▸</button></td>'+
        '<td><button class="mini" data-toggle="'+esc(p.pin)+'" data-act="'+(p.active?'0':'1')+'">'+(p.active?'停用':'启用')+'</button>'+
        '<button class="mini del" data-del="'+esc(p.pin)+'">删除</button></td>';
      tb.appendChild(tr);
    });
    tb.querySelectorAll('[data-blk]').forEach(function(b){b.addEventListener('click',function(){openBlockEditor(b.getAttribute('data-blk'));});});
    tb.querySelectorAll('[data-toggle]').forEach(function(b){b.addEventListener('click',function(){
      rpc('admin_set_partner_active',{p_admin:adminPin,p_pin:b.getAttribute('data-toggle'),p_active:b.getAttribute('data-act')==='1'})
        .then(function(){toast('已更新');refreshAccounts();}).catch(function(e){toast('失败：'+e.message);});
    });});
    tb.querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){
      if(!confirm('删除这所学校及其所有项目？无法撤销。'))return;
      rpc('admin_delete_partner',{p_admin:adminPin,p_pin:b.getAttribute('data-del')})
        .then(function(){toast('已删除');refreshAccounts();loadProjects();}).catch(function(e){toast('失败：'+e.message);});
    });});
  }

  function addPartner(){
    var school=$('#newSchool').value.trim();
    var pin=$('#newPin').value.trim();
    if(!pin){toast('请填 PIN');return;}
    $('#addBtn').disabled=true;
    rpc('admin_add_partner',{p_admin:adminPin,p_pin:pin,p_school:school}).then(function(d){
      $('#addBtn').disabled=false;
      if(d&&d.error){toast('失败：'+d.error);return;}
      $('#newSchool').value='';$('#newPin').value='';toast('已新增');refreshAccounts();
    }).catch(function(e){$('#addBtn').disabled=false;toast('失败：'+e.message);});
  }

  // ---------- 开放范围：专业 × 板块 ----------
  var BLOCKS_BY_DEPT={}, BM_DEPTS=[], bmPending={}, SEP='';
  function pk(dept,block){return dept+SEP+block;}
  function loadBlocks(){
    return rpc('admin_list_blocks',{p_admin:adminPin}).then(function(d){
      var pairs=(d&&d.blocks)||[];
      BLOCKS_BY_DEPT={};BM_DEPTS=[];
      pairs.forEach(function(x){
        var dept,block;
        if(typeof x==='string'){dept='（全部）';block=x;}
        else{dept=x.dept||'（未分类）';block=x.block;}
        if(!BLOCKS_BY_DEPT[dept]){BLOCKS_BY_DEPT[dept]=[];BM_DEPTS.push(dept);}
        if(BLOCKS_BY_DEPT[dept].indexOf(block)<0)BLOCKS_BY_DEPT[dept].push(block);
      });
    }).catch(function(){});
  }
  function openBlockEditor(pin){
    var p=PARTNERS[pin];if(!p)return;
    bmPin=pin;bmPending={};
    $('#bmSchool').textContent=(p.school_name||'')+'（'+pin+'）';
    var ensure=BM_DEPTS.length?Promise.resolve():loadBlocks();
    ensure.then(function(){
      return rpc('admin_get_partner_scope',{p_admin:adminPin,p_pin:pin});
    }).then(function(d){
      ((d&&d.scope)||[]).forEach(function(s){bmPending[pk(s.dept,s.block)]=1;});
      $('#bmDept').innerHTML=BM_DEPTS.map(function(dp){return '<option value="'+esc(dp)+'">'+esc(dp)+'</option>';}).join('');
      renderBmBlocks(BM_DEPTS.length?BM_DEPTS[0]:'');
      $('#blockModal').classList.add('show');
    }).catch(function(e){toast('载入范围失败：'+e.message);});
  }
  function renderBmBlocks(dept){
    var box=$('#bmList'),list=BLOCKS_BY_DEPT[dept]||[];
    box.innerHTML='';
    if(!list.length){box.innerHTML='<div class="empty">此专业没有板块。</div>';return;}
    list.forEach(function(b){
      var lab=document.createElement('label');lab.className='block-item';
      lab.innerHTML='<input type="checkbox" '+(bmPending[pk(dept,b)]?'checked':'')+' /> <span>'+esc(b)+'</span>';
      var cb=lab.querySelector('input');
      cb.addEventListener('change',function(){if(cb.checked)bmPending[pk(dept,b)]=1;else delete bmPending[pk(dept,b)];});
      box.appendChild(lab);
    });
  }
  function closeBlockEditor(){$('#blockModal').classList.remove('show');bmPin=null;}
  function saveBlocks(){
    if(!bmPin)return;
    var arr=Object.keys(bmPending).map(function(k){var i=k.indexOf(SEP);return {dept:k.slice(0,i),block:k.slice(i+1)};});
    $('#bmSave').disabled=true;
    rpc('admin_set_partner_scope',{p_admin:adminPin,p_pin:bmPin,p_scope:arr}).then(function(d){
      $('#bmSave').disabled=false;
      if(d&&d.error){toast('失败：'+d.error);return;}
      toast(arr.length?('已设定 '+arr.length+' 项（专业×板块）'):'已开放全部');
      closeBlockEditor();refreshAccounts();
    }).catch(function(e){$('#bmSave').disabled=false;toast('失败：'+e.message);});
  }

  function loadProjects(){
    rpc('admin_list_all_projects',{p_admin:adminPin}).then(function(d){
      var list=(d&&d.projects)||[];
      $('#sProjects').textContent=list.length;
      var tb=$('#projTable').querySelector('tbody');
      if(!list.length){tb.innerHTML='<tr><td colspan="6" class="empty">还没有任何项目。</td></tr>';return;}
      tb.innerHTML='';
      list.forEach(function(p){
        var d2=(p.updated_at||'').replace('T',' ').slice(0,16);
        var tr=document.createElement('tr');
        tr.innerHTML='<td>'+esc(p.project_name||'（未命名）')+'</td>'+
          '<td>'+esc(p.school_name||p.pin)+'</td>'+
          '<td class="mono">'+esc(p.dept||'')+' · '+esc(p.version||'')+'</td>'+
          '<td class="num">'+(p.course_count||0)+'</td>'+
          '<td class="mono">'+esc(d2)+'</td>'+
          '<td><button class="mini" data-export="'+esc(p.id)+'">导出 PDF</button></td>';
        tb.appendChild(tr);
      });
      tb.querySelectorAll('[data-export]').forEach(function(b){b.addEventListener('click',function(){exportProject(b.getAttribute('data-export'));});});
    }).catch(function(){});
  }

  // ---------- 导出某项目的课程架构表 ----------
  function exportProject(id){
    toast('准备导出…');
    rpc('admin_load_project',{p_admin:adminPin,p_id:id}).then(function(p){
      if(!p||p.error){toast('载入失败：'+((p&&p.error)||'未知'));return;}
      $('#printArea').innerHTML=buildStructure(p);
      setTimeout(function(){window.print();},80);
    }).catch(function(e){toast('失败：'+e.message);});
  }
  function buildStructure(p){
    var rows=p.payload||[];
    var _d=new Date(),_p=function(n){return(n<10?'0':'')+n;};
    var dateStr=_d.getFullYear()+'-'+_p(_d.getMonth()+1)+'-'+_p(_d.getDate());
    var majors=[],mIdx={};
    rows.forEach(function(c){
      var mk=(c.dept||'')+' · '+(c.version||'');
      if(!mIdx[mk]){mIdx[mk]={dept:c.dept||'',ver:c.version||'',blocks:{},order:[]};majors.push(mIdx[mk]);}
      var m=mIdx[mk],b=c.block||'未分类';
      if(!m.blocks[b]){m.blocks[b]=[];m.order.push(b);}
      m.blocks[b].push(c);
    });
    var gCount=0,gCredit=0;
    var html='<div class="out-card"><div class="out-head"><div class="t">课程架构表</div><div class="m">'+
      '<span>合作学校 · '+esc(p.school_name||p.pin||'')+'</span><span>合作项目 · '+esc(p.project_name||'（未命名）')+'</span><span>制表日期 · '+dateStr+'</span></div></div>';
    majors.forEach(function(m){
      var mCount=0,mCredit=0;
      html+='<div class="o-major"><div class="o-major-h"><span>'+esc(m.dept)+'</span><span class="yr">'+esc(m.ver)+' 版本</span></div>';
      m.order.forEach(function(b){
        var rs=m.blocks[b],cCredit=0;
        html+='<div class="o-block">'+esc(b)+'</div><table class="out"><thead><tr><th>代码</th><th>课程名称（中）</th><th>课程名称（英）</th><th>对接</th><th class="num">学分</th></tr></thead><tbody>';
        rs.forEach(function(c){
          var cr=parseFloat(c.credit)||0;
          html+='<tr><td class="code">'+esc(c.code||'')+'</td><td>'+esc(c.zh||'')+'</td><td class="en">'+esc(c.en||'')+'</td><td class="map">'+esc(c.map||'')+'</td><td class="num">'+cr+'</td></tr>';
          cCredit+=cr;
        });
        html+='<tr class="subtotal"><td colspan="2">小计</td><td class="num">'+rs.length+' 门</td><td></td><td class="num">'+cCredit+'</td></tr></tbody></table>';
        mCount+=rs.length;mCredit+=cCredit;
      });
      html+='<div class="o-major-total">'+esc(m.dept)+' · 专业合计　总课数 <b>'+mCount+'</b> 门　总学分 <b>'+mCredit+'</b></div></div>';
      gCount+=mCount;gCredit+=mCredit;
    });
    html+='<div class="grand"><span>全项目合计 &nbsp;<b>'+gCount+'</b> 门课</span><span>总学分 &nbsp;<b>'+gCredit+'</b></span></div></div>';
    return html;
  }

  // tabs
  document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
    t.classList.add('on');
    var name=t.getAttribute('data-tab');
    $('#tab-accounts').style.display=name==='accounts'?'':'none';
    $('#tab-projects').style.display=name==='projects'?'':'none';
    if(name==='projects')loadProjects();
  });});

  $('#loginBtn').addEventListener('click',login);
  $('#apin').addEventListener('keydown',function(e){if(e.key==='Enter')login();});
  $('#apinEye').addEventListener('click',function(){
    var inp=$('#apin');var show=inp.type==='password';
    inp.type=show?'text':'password';this.textContent=show?'🙈':'👁';inp.focus();
  });
  $('#logoutA').addEventListener('click',function(e){e.preventDefault();try{sessionStorage.clear();}catch(_){}window.location.href='./index.html';});

  // 从统一登入页带过来的管理员 → 自动登入
  try{
    if(sessionStorage.getItem('pcp_role')==='admin'){
      var sp=sessionStorage.getItem('pcp_pin');
      if(sp){$('#apin').value=sp;login();}
    }
  }catch(e){}
  $('#addBtn').addEventListener('click',addPartner);
  $('#bmSave').addEventListener('click',saveBlocks);
  $('#bmCancel').addEventListener('click',closeBlockEditor);
  $('#bmDept').addEventListener('change',function(){renderBmBlocks(this.value);});
  $('#bmAll').addEventListener('click',function(){var d=$('#bmDept').value;(BLOCKS_BY_DEPT[d]||[]).forEach(function(b){bmPending[pk(d,b)]=1;});renderBmBlocks(d);});
  $('#bmNone').addEventListener('click',function(){var d=$('#bmDept').value;(BLOCKS_BY_DEPT[d]||[]).forEach(function(b){delete bmPending[pk(d,b)];});renderBmBlocks(d);});
  $('#blockModal').addEventListener('click',function(e){if(e.target===$('#blockModal'))closeBlockEditor();});
})();
</script>
